<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordine – WIR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

<div class="header-container">
    <div class="logo-box"><img src="logo123.png" alt="logo"></div>
    <nav class="nav-strip" id="drugi">
        <div class="nav-links">
            <a href="index.html" data-it="Home" data-en="Home" data-pl="Główna">Home</a>
            <a href="chi-siamo.html" data-it="Chi siamo" data-en="About us" data-pl="O nas">Chi siamo</a>
            <a href="prodotti.html" data-it="Prodotti" data-en="Products" data-pl="Produkty">Prodotti</a>
            <a href="contatti.html" data-it="Contatti" data-en="Contact" data-pl="Kontakt">Contatti</a>
        </div>
        <div class="lang-buttons">
            <button id="cart-btn">🛒 <span id="cart-count">0</span></button>
            <button onclick="setLang('it')">IT</button>
            <button onclick="setLang('en')">EN</button>
            <button onclick="setLang('pl')">PL</button>
        </div>
    </nav>
</div>

<main class="checkout-container">
    <h2 data-it="Il tuo Carrello" data-en="Your Cart" data-pl="Twój Koszyk">Il tuo Carrello</h2>
    <div id="cart-items"></div>
    <div class="cart-total-container">
        <strong data-it="Il totale:" data-en="Total:" data-pl="Razem:">Razem:</strong> 
        <span id="cart-total">0.00</span> €
    </div>
    <hr>
    <section class="order-form">
        <h3 data-it="Dati di contatto" data-en="Contact details" data-pl="Dane kontaktowe">Dane kontaktowe</h3>
        <div class="form-group">
            <input type="email" id="email" 
                   pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                   oninput="this.value = this.value.toLowerCase()"
                   data-p-it="Email (solo minuscole)" 
                   data-p-en="Email (lowercase only)" 
                   data-p-pl="Email (tylko małe litery)" required>
        </div>
        <div class="form-group">
    <input type="tel" id="phone" 
           pattern="^\+[0-9]+$"
           oninput="validatePlus(this)"
           data-p-it="Telefono (es. +39...)" 
           data-p-en="Phone (e.g. +44...)" 
           data-p-pl="Telefon (np. +48...)" required>
</div>
        <h3 data-it="Metodo di pagamento" data-en="Payment method" data-pl="Metoda płatności">Metoda płatności</h3>
        <select id="payment-method">
            <option value="card" data-it="Carta di Credito" data-en="Credit Card" data-pl="Karta Kredytowa">Karta Kredytowa</option>
            <option value="paypal">PayPal</option>
            <option value="transfer" data-it="Bonifico" data-en="Bank Transfer" data-pl="Przelew bankowy">Przelew bankowy</option>
        </select>
        <button class="btn checkout-btn" onclick="processOrder()" data-it="Ordina ora" data-en="Order now" data-pl="Zamów teraz">Ordina teraz</button>
    </section>
</main>
<footer>
    <b><p data-it="Contatti" data-en="Contact" data-pl="Kontakt">Contatti</p></b>
    <b><p>Email: info@wir-innovation.it</p></b>
    <b><p data-it="© WIR – Tutti i diritti riservati" 
       data-en="© WIR – All rights reserved" 
       data-pl="© WIR – Wszelkie prawa zastrzeżone">
       © 2026 WIR – Tutti i diritti riservati
    </p></b>
</footer>
<script>
const translations = {
    it: { 
        empty: "Il carrello è vuoto!", 
        fill: "Per favore, compila tutti i campi!", 
        phoneError: "Il numero di telefono deve iniziare con + e contenere solo cifre!",
        emailError: "L'email deve essere valida e contenere solo lettere minuscole!",
        success: "Grazie! Ordine effettuato." 
    },
    en: { 
        empty: "The cart is empty!", 
        fill: "Please fill in all fields!", 
        phoneError: "Phone number must start with + and contain only digits!",
        emailError: "Email must be valid and contain only lowercase letters!",
        success: "Thank you! Order placed." 
    },
    pl: { 
        empty: "Koszyk jest pusty!", 
        fill: "Proszę wypełnić wszystkie pola!", 
        phoneError: "Numer telefonu musi zaczynać się od + i zawierać tylko cyfry!",
        emailError: "Email musi być poprawny i zawierać tylko małe litery!",
        success: "Dziękujemy! Zamówienie złożone." 
    }
};

function setLang(lang) {
    document.querySelectorAll('[data-it]').forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text) el.innerHTML = text;
    });
    document.querySelectorAll('[data-p-it]').forEach(el => {
        const placeholder = el.getAttribute('data-p-' + lang);
        if (placeholder) el.placeholder = placeholder;
    });
    document.documentElement.lang = lang;
    localStorage.setItem('selectedLang', lang);
}

let cart = JSON.parse(localStorage.getItem('wir_cart')) || [];

function updateCart() {
    const container = document.getElementById('cart-items');
    const countEl = document.getElementById('cart-count');
    const totalEl = document.getElementById('cart-total');
    let total = 0, count = 0;
    container.innerHTML = '';
    cart.forEach(item => {
        total += item.price * item.qty;
        count += item.qty;
        container.innerHTML += `<div class="cart-item"><div><strong>${item.name}</strong><br><small>${item.qty} x ${item.price} €</small></div><button onclick="removeFromCart('${item.name}')" class="remove-btn">✕</button></div>`;
    });
    countEl.innerText = count;
    totalEl.innerText = total.toFixed(2);
    localStorage.setItem('wir_cart', JSON.stringify(cart));
}

function removeFromCart(name) {
    cart = cart.filter(i => i.name !== name);
    updateCart();
}

function processOrder() {
    const lang = localStorage.getItem('selectedLang') || 'it';
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    
    const phoneRegex = /^\+[0-9]+$/;
    const emailRegex = /^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/;

    if (!email || !phone) return alert(translations[lang].fill);
    if (!emailRegex.test(email)) return alert(translations[lang].emailError);
    if (!phoneRegex.test(phone)) return alert(translations[lang].phoneError);
    if (cart.length === 0) return alert(translations[lang].empty);

    alert(`${translations[lang].success}\nSuma: ${document.getElementById('cart-total').innerText} €`);
    cart = [];
    updateCart();
}

window.addEventListener('DOMContentLoaded', () => {
    setLang(localStorage.getItem('selectedLang') || 'it');
    updateCart();
});
</script>
</body>
</html>
